name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore StudentApi.Tests/StudentApi.Tests.csproj
      - run: dotnet build StudentApi.Tests/StudentApi.Tests.csproj --configuration Release --no-restore
      - run: dotnet test StudentApi.Tests/StudentApi.Tests.csproj --configuration Release --no-build
